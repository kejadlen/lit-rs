name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # The z3 `static-link-z3` feature builds z3 from source, which needs cmake
      # and a C++ toolchain. ubuntu-latest ships the compiler; install cmake.
      - run: sudo apt-get update && sudo apt-get install -y cmake

      - run: rustup component add clippy rustfmt llvm-tools
      - run: cargo install grcov cargo-mutants just

      - name: Check formatting
        run: cargo fmt --all --check

      # src/ is generated from lit/*.md; fail if the committed output is stale.
      - name: Verify src/ matches the literate sources
        run: |
          just tangle
          git diff --exit-code

      - run: just clippy
      - run: cargo test --workspace

      # Coverage and mutation testing run for visibility but do not gate CI yet.
      - name: Coverage
        run: just coverage
        continue-on-error: true

      - name: Mutation testing
        run: just mutants
        continue-on-error: true
