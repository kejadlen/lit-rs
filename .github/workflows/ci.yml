name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - run: rustup component add clippy rustfmt llvm-tools
      - run: cargo install grcov cargo-mutants just

      - name: Check formatting
        run: cargo fmt --all --check

      # src/ is generated from lit/*.md; fail if the committed output is stale.
      - name: Verify src/ matches the literate sources
        run: |
          just tangle
          git diff --exit-code

      - run: just clippy
      - run: cargo test --workspace

      - name: Coverage
        run: just coverage

      # Mutation testing runs for visibility but does not gate CI.
      - name: Mutation testing
        run: just mutants
        continue-on-error: true
